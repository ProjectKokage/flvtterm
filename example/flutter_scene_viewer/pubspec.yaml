name: flvtterm_flutter_scene_viewer
description: Flutter Scene viewer example for flvtterm VRM runtime integration.
publish_to: none

environment:
  sdk: ^3.11.5
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_scene: ^0.17.0
  flvtterm:
    path: ../..
  flvtterm_flutter_scene:
    path: ../../packages/vrm_flutter_scene
  vector_math: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/
